<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quiz Builder - Shareable</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* Giữ nguyên CSS cũ của bạn và thêm một chút cho nút chia sẻ */
:root{
  --bg:#0d0d0f; --bg2:#131316; --bg3:#1a1a1f; --bg4:#222228;
  --border:#2a2a32; --border2:#38383f; --text:#f0f0f4; --text2:#9898a8;
  --accent:#7c6fff; --green:#2dd98e; --red:#ff5f5f;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;margin:0;display:flex;justify-content:center;padding:20px;}
.container{width:100%;max-width:500px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
.btn{cursor:pointer;padding:12px;border-radius:8px;border:none;font-weight:600;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary{background:var(--accent);color:#white;}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent);margin-top:10px;}
.screen{display:none;}
.screen.active{display:block;}
input, select, textarea{width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border);color:white;border-radius:8px;margin-bottom:15px;box-sizing:border-box;}
/* Các style bổ sung khác giữ nguyên từ file gốc của bạn... */
</style>
</head>
<body>

<div class="container">
  <div id="screen-home" class="screen active">
    <h2 style="font-family:'Syne'">Cấu hình bài thi</h2>
    <input type="text" id="quiz-name" placeholder="Tên bài trắc nghiệm..." value="Bài trắc nghiệm mới">
    
    <label>Thời gian (phút):</label>
    <select id="time-select">
      <option value="5">5 phút</option>
      <option value="15">15 phút</option>
      <option value="30">30 phút</option>
    </select>

    <div id="questions-list"></div>
    <button class="btn btn-outline" style="width:100%" onclick="addQuestion()">+ Thêm câu hỏi</button>
    
    <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
    
    <button class="btn btn-primary" style="width:100%" onclick="startQuiz()">Bắt đầu làm bài</button>
    
    <button id="btn-share" class="btn btn-outline" style="width:100%" onclick="shareQuiz()">
      Chia sẻ bài thi này (Copy link)
    </button>
  </div>

  <div id="screen-quiz" class="screen">
    <div id="quiz-header" style="display:flex;justify-content:space-between;margin-bottom:20px">
      <span id="timer">--:--</span>
      <span id="progress">1/1</span>
    </div>
    <div id="question-body"></div>
  </div>

  <div id="screen-result" class="screen">
    <center>
      <h2 id="res-grade">0/0</h2>
      <button class="btn btn-primary" onclick="location.reload()">Tạo bài mới</button>
    </center>
  </div>
</div>

<script>
let questions = [];
let quizQuestions = [];
let userAnswers = [];
let currentQ = 0;
let timerInterval;

// --- LOGIC CHIA SẺ (QUAN TRỌNG) ---

function shareQuiz() {
  if (questions.length === 0) {
    alert("Bạn chưa có câu hỏi nào để chia sẻ!");
    return;
  }
  
  const data = {
    n: document.getElementById('quiz-name').value,
    t: document.getElementById('time-select').value,
    q: questions
  };

  try {
    // Mã hóa dữ liệu sang chuỗi để gắn vào URL
    const str = JSON.stringify(data);
    const encoded = btoa(unescape(encodeURIComponent(str)));
    const url = window.location.origin + window.location.pathname + '?quiz=' + encoded;

    navigator.clipboard.writeText(url).then(() => {
      alert("Đã sao chép link chia sẻ! Hãy gửi link này cho người khác để họ làm bài.");
    });
  } catch(e) {
    alert("Có lỗi khi tạo link chia sẻ.");
  }
}

function checkUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const quizData = params.get('quiz');

  if (quizData) {
    try {
      const decoded = JSON.parse(decodeURIComponent(escape(atob(quizData))));
      
      // Nạp dữ liệu
      questions = decoded.q;
      document.getElementById('quiz-name').value = decoded.n;
      document.getElementById('time-select').value = decoded.t;

      // Ẩn các phần chỉnh sửa để người dùng chỉ việc làm bài
      document.getElementById('btn-share').style.display = 'none';
      document.querySelectorAll('.btn-outline').forEach(b => b.style.display = 'none');
      
      // Tự động bắt đầu
      startQuiz();
    } catch(e) {
      console.error("Lỗi link:", e);
    }
  }
}

// --- LOGIC CƠ BẢN ---

function addQuestion() {
  const q = {
    text: "Câu hỏi mới?",
    options: ["Đáp án A", "Đáp án B", "Đáp án C", "Đáp án D"],
    correct: 0
  };
  questions.push(q);
  renderHomeQuestions();
}

function renderHomeQuestions() {
  const container = document.getElementById('questions-list');
  container.innerHTML = questions.map((q, i) => `
    <div style="background:var(--bg3); padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid var(--border)">
      <input type="text" value="${q.text}" onchange="questions[${i}].text=this.value">
      ${q.options.map((opt, oi) => `
        <div style="display:flex; gap:5px; margin-bottom:5px">
          <input type="radio" name="correct-${i}" ${q.correct==oi?'checked':''} onchange="questions[${i}].correct=${oi}">
          <input type="text" value="${opt}" onchange="questions[${i}].options[${oi}]=this.value" style="margin:0">
        </div>
      `).join('')}
    </div>
  `).join('');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  if(questions.length === 0) return alert("Chưa có câu hỏi!");
  quizQuestions = [...questions];
  userAnswers = new Array(quizQuestions.length).fill(null);
  currentQ = 0;
  showScreen('screen-quiz');
  renderQuestion();
  startTimer();
}

function renderQuestion() {
  const q = quizQuestions[currentQ];
  document.getElementById('progress').innerText = `${currentQ + 1}/${quizQuestions.length}`;
  document.getElementById('question-body').innerHTML = `
    <h3>${q.text}</h3>
    ${q.options.map((opt, i) => `
      <button class="btn btn-outline" style="width:100%; text-align:left; justify-content:flex-start" onclick="selectAns(${i})">
        ${String.fromCharCode(65+i)}. ${opt}
      </button>
    `).join('')}
  `;
}

function selectAns(i) {
  userAnswers[currentQ] = i;
  if(currentQ < quizQuestions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function startTimer() {
  let time = parseInt(document.getElementById('time-select').value) * 60;
  timerInterval = setInterval(() => {
    time--;
    let m = Math.floor(time/60);
    let s = time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
    if(time <= 0) finishQuiz();
  }, 1000);
}

function finishQuiz() {
  clearInterval(timerInterval);
  let score = 0;
  userAnswers.forEach((ans, i) => {
    if(ans === quizQuestions[i].correct) score++;
  });
  document.getElementById('res-grade').innerText = `Kết quả: ${score}/${quizQuestions.length}`;
  showScreen('screen-result');
}

// Kiểm tra khi vừa tải trang
window.onload = checkUrlParams;
</script>

</body>
</html>
